<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Flashcard Study</h1>
    <div class="progress" id="progress">Card 1 of 3</div>

    <div class="scene">
        <div class="card" id="card">
            <div class="card__face card__face--front" id="front-text">Loading...</div>
            <div class="card__face card__face--back" id="back-text">...</div>
        </div>
    </div>
    <div style="margin-top: 10px; font-size: 0.8rem; color: #888;">(Click card to flip)</div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
