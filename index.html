<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Examen N3</h1>
    <div class="progress" id="progress">
        Card <input type="number" id="cardIndexInput" min="1" value="1"
            style="width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: inherit; color: inherit; background: transparent;">
        of <span id="totalCards">0</span>
    </div>

    <div class="scene">
        <div class="card" id="card">
            <div class="card__face card__face--front" id="front-text">Loading...</div>
            <div class="card__face card__face--back" id="back-text">...</div>
        </div>
    </div>
    <div style="margin-top: 10px; font-size: 0.8rem; color: #888;">(Source: <a
            href="https://www.plongee-plaisir.com/fr/book/plongee-niveau-3/" target="_blank"
            style="color: inherit;">Plongée Plaisir</a>. Click card to flip)</div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="randomBtn">Random</button>
        <button id="nextBtn">Next</button>
    </div>

    <div style="margin-top: 20px;">
        <button id="filterBtn" style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">Show
            Important</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
