<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard App</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #555;
        }

        /* Progress Bar */
        .progress {
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #777;
        }

        /* The Flashcard Scene */
        .scene {
            width: 300px;
            height: 200px;
            perspective: 600px;
            /* Gives the 3D depth */
            cursor: pointer;
        }

        /* The Card Object */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Flip Action */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* Card Faces */
        .card__face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            /* Hides back when facing away */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 12px;
            background: var(--card-bg);
            font-size: 1.2rem;
            line-height: 1.4;
        }

        .card__face--front {
            border: 2px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
        }

        .card__face--back {
            background-color: var(--primary);
            color: white;
            transform: rotateY(180deg);
        }

        /* Navigation Buttons */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #ddd;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #ccc;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Utility to hide the raw markdown */
        #raw-markdown {
            display: none;
        }
    </style>
</head>

<body>

    <h1>Flashcard Study</h1>
    <div class="progress" id="progress">Card 1 of 3</div>

    <div class="scene">
        <div class="card" id="card">
            <div class="card__face card__face--front" id="front-text">Loading...</div>
            <div class="card__face card__face--back" id="back-text">...</div>
        </div>
    </div>
    <div style="margin-top: 10px; font-size: 0.8rem; color: #888;">(Click card to flip)</div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script id="raw-markdown" type="text/template">
What is the "Danger Zone" temperature range for food?
The Danger Zone is between **40°F and 140°F** (4°C - 60°C). Bacteria grow most rapidly in this range.

---

What is the minimum internal temperature for cooking chicken?
You must cook chicken to at least **165°F (74°C)** to kill Salmonella.

---

What is cross-contamination?
It is the transfer of harmful bacteria to food from other foods, cutting boards, or utensils (e.g., using the same knife for raw meat and lettuce).

---

How should you thaw frozen meat safely?
Thaw it in the **refrigerator**, in cold water (changed every 30 mins), or in the microwave. Never thaw on the counter.
    </script>

    <script>
        // 1. Get the content
        const rawText = document.getElementById('raw-markdown').innerHTML.trim();

        // 2. Parse the Markdown
        // We split by "---" to get cards, then split by newline for Q vs A
        const cards = rawText.split('---').map(chunk => {
            const lines = chunk.trim().split('\n');
            const question = lines[0]; // First line is question
            const answer = lines.slice(1).join('<br>'); // Rest is answer

            // basic bold parser for **text**
            const parseBold = (txt) => txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            return {
                q: parseBold(question.trim()),
                a: parseBold(answer.trim())
            };
        });

        // 3. State Management
        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const progress = document.getElementById('progress');

        // 4. Functions
        function updateCard() {
            // Reset flip state
            cardElement.classList.remove('is-flipped');

            // Wait a tiny bit to update text so user doesn't see it change while flipping back
            setTimeout(() => {
                const currentCard = cards[currentIndex];
                frontText.innerHTML = currentCard.q;
                backText.innerHTML = currentCard.a;
                progress.innerText = `Card ${currentIndex + 1} of ${cards.length}`;
            }, 200);
        }

        // 5. Event Listeners
        cardElement.addEventListener('click', () => {
            cardElement.classList.toggle('is-flipped');
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                // Optional: Loop back to start
                currentIndex = 0;
                updateCard();
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        });

        // Initialize
        updateCard();
    </script>
</body>

</html>
