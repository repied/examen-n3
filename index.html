<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révisions Examen N3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

    <div id="gate" class="gate">
        <div class="gate__panel" role="dialog" aria-modal="true" aria-label="Mot de passe requis">
            <h2>Saisissez le mot de passe</h2>
            <input id="passwordInput" type="password" placeholder="Mot de passe" aria-label="Mot de passe">
            <div id="gateMessage" class="gate__msg" aria-live="polite"></div>
            <div class="gate__actions">
                <button id="unlockBtn">Entrer</button>
            </div>
            <div class="gate__hint">Entrez le mot de passe pour accéder à l'application.</div>
        </div>
    </div>

    <div style="position: absolute; top: 20px; right: 20px;">
        <button id="themeToggle"
            style="padding: 8px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--primary); background: var(--card-bg); color: var(--text);">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <h1>Examen N3</h1>
    <div class="progress" id="progress">
        Question <input type="number" id="cardIndexInput" min="1" value="1"
            style="width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: inherit; color: inherit; background: transparent;">
        sur <span id="totalCards">0</span>
    </div>

    <div class="scene">
        <div class="card" id="card">
            <div class="card__face card__face--front" id="front-text">Chargement...</div>
            <div class="card__face card__face--back" id="back-text">...</div>
        </div>
    </div>
    <div style="margin-top: 10px; font-size: 0.8rem; color: #888;">(Source : <a
            href="https://www.plongee-plaisir.com/fr/book/plongee-niveau-3/" target="_blank"
            style="color: inherit;">Plongée Plaisir</a>. Cliquez pour retourner)</div>

    <div class="controls">
        <button id="prevBtn">Précédent</button>
        <button id="randomBtn">Aléatoire</button>
        <button id="nextBtn">Suivant</button>
    </div>

    <div style="margin-top: 20px;">
        <button id="filterBtn">Questions éliminatoires seulement</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
