<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révisions Examen N3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

    <div id="gate" class="gate">
        <div class="gate__panel" role="dialog" aria-modal="true" aria-label="Mot de passe requis">
            <h2>Saisissez le mot de passe</h2>
            <input id="passwordInput" type="password" placeholder="Mot de passe" aria-label="Mot de passe">
            <div id="gateMessage" class="gate__msg" aria-live="polite"></div>
            <div class="gate__actions">
                <button id="unlockBtn">Entrer</button>
            </div>
            <div class="gate__hint">Entrez le mot de passe pour accéder à l'application.</div>
        </div>
    </div>

    <h1>Examen N3</h1>
    <div class="progress" id="progress">
        <select id="deckSelect"
            style="border: 1px solid #ccc; border-radius: 4px; font-size: inherit; color: inherit; background: transparent; padding: 2px;">
            <option value="all">PlongéePlaisir (toutes)</option>
            <option value="important">PlongéePlaisir (éliminatoires)</option>
            <option value="pierre">Pierre's questions</option>
        </select>
        <span style="margin: 0 8px;">|</span>
        Question <input type="number" id="cardIndexInput" min="1" value="1"
            style="width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: inherit; color: inherit; background: transparent;">
        sur <span id="totalCards">0</span>
        <div class="progress__controls" aria-hidden="false">
            <button type="button" class="prevBtn" aria-label="Précédent">◀</button>
            <button type="button" class="randomBtn" aria-label="Aléatoire">🎲</button>
            <button type="button" class="nextBtn" aria-label="Suivant">▶</button>
        </div>
    </div>

    <div class="scene">
        <div class="card" id="card">
            <div class="card__face card__face--front" id="front-text">
                Chargement...
            </div>
            <div class="card__face card__face--back" id="back-text">
                ...
            </div>

            <!-- Controls are outside the faces so they are always on top and move with the card -->

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
